<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="Login.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
    />
  </head>
  <body>
    <img class="gambar" src="image/bali.jpg">
    <!-- Navigation Bar dan Logo -->
    <header>
      <a href="#" class="logo">epication</a>
      <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">Catalogue</a>
        <a href="#">Blog</a>
        <a href="#">About Us</a>
        <a href="#">Contact</a>
        <a href="#">Terms</a>
        <a href="#">FAQs</a>
      </nav>
    </header>
    <footer>
      <p class="footerphone">Hotline Number</p>
      <p class="footerphone">013-4356725 (Farid)</p>
      <p>019-5667824 (Imran)</p>
      <p class="email">Subscribe to our email</p>
    </footer>
    <!-- Login -->
    <div class="wrapper">
      <form action="">
        <h1>Login</h1>
        <div class="input-box">
          <input type="text" placeholder="Username" required />
          <!-- <i class="bx bxs-user"></i> -->
        </div>
        <div class="input-box">
          <input type="password" placeholder="Password" required />
          <!-- <i class="bx bxs-lock-alt"></i> -->
        </div>

        <div class="remember-forgot">
          <label><input type="checkbox" />Remember me</label>
          <a href="#">Forgot password</a>
        </div>

        <button type="submit" class="btn">Login</button>
        <div class="in">
          <button type="submit" class="sign">Sign in with Facebook</button>
          <button type="submit" class="sign">Sign in with Google</button>
        </div>
        <div class="register-link">
          <p>Don't have any account? <a href="#">Register</a></p>
        </div>
      </form>
    </div>
  </body>
</html>
