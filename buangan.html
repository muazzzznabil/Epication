<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fit Picture in a Box</title>

  <style>
    /* Style the container box */
    .image-box {
      width: 300px; /* Set the desired width for the box */
      height: 200px; /* Set the desired height for the box */
      border: 1px solid #ccc; /* Optional: Add a border for better visibility */
      overflow: hidden; /* Ensure that the image doesn't overflow the box */
    }

    /* Style the image to fit inside the box */
    .image-box img {
      width: 100%; /* Make the image take 100% of the width of its container */
      height: auto; /* Maintain the aspect ratio */
      display: block; /* Remove extra space below the image */
    }
  </style>
</head>
<body>

  <!-- Container box -->
  <div class="image-box">
    <!-- Image -->
    <img src="image/bali.jpg" alt="Your Image">
  </div>







</body>
</html>
