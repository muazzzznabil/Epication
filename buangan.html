<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Effect with Description</title>

  <style>
    /* Style the box */
    .hover-box {
      width: 200px;
      height: 200px;
      background-color: lightblue;
      position: relative;
      overflow: hidden;
    }

    /* Style the description */
    .description {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      color: #fff;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Show description on hover */
    .hover-box:hover .description {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Box with description -->
  <div class="hover-box">
    <div class="description">
      This is a description.
    </div>
  </div>

</body>
</html>
