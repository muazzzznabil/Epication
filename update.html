<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table with Update Button</title>
  <style>
    table {
      border-collapse: collapse;
      width: 300px; /* Adjust the width as needed */
    }

    th, td {
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2; /* Header background color */
    }

    td {
      border: none; /* Remove borders for data cells */
    }

    input {
      width: 100%;
      padding: 5px;
      box-sizing: border-box;
    }

    button {
      margin-top: 10px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<table id="table-profile">
  <tr>
    <th>Name</th>
    <td id="nameCell">John Doe</td>
    <td>
      <button onclick="toggleInput('nameInput')">Update</button>
      <input type="text" id="nameInput" style="display: none;" placeholder="Enter new name">
    </td>
  </tr>
  <tr>
    <th>Age</th>
    <td id="ageCell">30</td>
    <td>
      <button onclick="toggleInput('ageInput')">Update</button>
      <input type="number" id="ageInput" style="display: none;" placeholder="Enter new age" min="1">
    </td>
  </tr>
  <tr>
    <th>Email</th>
    <td id="emailCell">john@example.com</td>
    <td>
      <button onclick="toggleInput('emailInput')">Update</button>
      <input type="email" id="emailInput" style="display: none;" placeholder="Enter new email">
    </td>
  </tr>
  <tr>
    <th>Phone Number</th>
    <td id="phoneCell">+1234567890</td>
    <td>
      <button onclick="toggleInput('phoneInput')">Update</button>
      <input type="tel" id="phoneInput" style="display: none;" placeholder="Enter new phone number" pattern="[0-9]{10}">
    </td>
  </tr>
</table>

<button onclick="updateTable()">Confirm Update</button>

<script>
  function toggleInput(inputId) {
    var inputField = document.getElementById(inputId);
    inputField.style.display = inputField.style.display === 'none' ? 'block' : 'none';
  }

  function updateTable() {
    // Get input values
    var newName = document.getElementById("nameInput").value;
    var newAge = document.getElementById("ageInput").value;
    var newEmail = document.getElementById("emailInput").value;
    var newPhone = document.getElementById("phoneInput").value;

    // Update table cells with new values if input is not empty and meets validation criteria
    if (newName !== "") {
      document.getElementById("nameCell").textContent = newName;
    }
    if (newAge !== "" && parseInt(newAge) >= 1) {
      document.getElementById("ageCell").textContent = newAge;
    }
    if (newEmail !== "") {
      document.getElementById("emailCell").textContent = newEmail;
    }
    if (newPhone !== "") {
      document.getElementById("phoneCell").textContent = newPhone;
    }

    // Hide input fields and show buttons
    document.getElementById("nameInput").style.display = "none";
    document.getElementById("ageInput").style.display = "none";
    document.getElementById("emailInput").style.display = "none";
    document.getElementById("phoneInput").style.display = "none";

    document.getElementById("nameInput").value = "";
    document.getElementById("ageInput").value = "";
    document.getElementById("emailInput").value = "";
    document.getElementById("phoneInput").value = "";
  }
</script>

</body>
</html>
