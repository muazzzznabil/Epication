    <script>
        var slideIndex = 0;
        showSlides();

        function showSlides() {
            var i;
            var slides = document.getElementsByClassName("trapeziumLeft");
            var slidesRight = document.getElementsByClassName("trapeziumRight");

            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            for (i = 0; i < slidesRight.length; i++) {
                slidesRight[i].style.display = "none";
            }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1 }
            slides[slideIndex - 1].style.display = "block";
            if (slideIndex > slidesRight.length) { slideIndex = 1 }
            slidesRight[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 2000);
        }
    </script>
